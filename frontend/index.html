<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estação da Pizza</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .central { text-align: center; background: #fff; padding: 40px; border-radius: 12px; box-shadow: var(--sombra-card); }
        .central img { width: 120px; height: 120px; }
        .central h1 { font-family: var(--fonte-display); color: var(--cor-verde-escuro); font-weight: 400; }
        .links { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .links a {
            background: var(--cor-vermelho); color: #fff; text-decoration: none;
            padding: 12px 22px; border-radius: 8px; font-weight: 600;
        }
        .links a:hover { background: var(--cor-vermelho-escuro); }
    </style>
</head>
<body>
    <div class="central">
        <img src="imagens/logo.png" alt="Estação da Pizza">
        <h1>Estação da Pizza</h1>
        <p>Desde 2008</p>
        <div class="links">
            <a href="cliente/">🍕 Fazer Pedido</a>
        </div>
    </div>
</body>
</html>
