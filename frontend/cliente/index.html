<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estação da Pizza - Cardápio</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="css/cliente.css">
</head>
<body>

    <header class="topo-loja">
        <img src="../imagens/logo.png" alt="Estação da Pizza">
        <div class="topo-info">
            <h1>Estação da Pizza</h1>
            <p>Desde 2008</p>
        </div>
        <button class="icone-busca" id="btn-busca" aria-label="Buscar">🔍</button>
    </header>

    <div class="faixa-status" id="faixa-status">Carregando horário...</div>

    <div class="barra-busca oculto" id="barra-busca">
        <input type="text" id="input-busca" placeholder="Pesquise pelo nome do sabor...">
    </div>

    <nav class="chips-categoria" id="chips-categoria">
        <button class="chip ativo" data-cat="tradicional">Tradicional</button>
        <button class="chip" data-cat="especial">Especial</button>
        <button class="chip" data-cat="doce">Doce</button>
        <button class="chip" data-cat="promocao">Promoção</button>
        <button class="chip" data-cat="bebidas">Bebidas</button>
    </nav>

    <main id="secoes-cardapio">
        <p class="carregando">Carregando cardápio...</p>
    </main>

    <!-- Ficha do produto (abre ao tocar num sabor) -->
    <div class="sheet-fundo oculto" id="sheet-fundo-produto">
        <div class="sheet" id="sheet-produto">
            <button class="fechar-sheet" id="fechar-sheet-produto">×</button>
            <div class="sheet-imagem" id="sheet-imagem">🍕</div>
            <h2 id="sheet-titulo">Nome do sabor</h2>

            <label>Tamanho</label>
            <select id="sheet-fatias">
                <option value="4">4 fatias</option>
                <option value="6">6 fatias</option>
                <option value="8">8 fatias</option>
                <option value="12">12 fatias</option>
                <option value="14">14 fatias</option>
            </select>
            <p id="sheet-preco"></p>

            <label>Mais sabores nessa pizza? (opcional, até 3 no total)</label>
            <div id="sheet-sabores-extra" class="grade-opcoes"></div>

            <label>Borda Recheada</label>
            <select id="sheet-borda">
                <option value="">Sem borda</option>
            </select>

            <div class="linha-quantidade">
                <label>Quantidade</label>
                <div class="stepper">
                    <button type="button" id="qtd-menos">−</button>
                    <span id="qtd-valor">1</span>
                    <button type="button" id="qtd-mais">+</button>
                </div>
            </div>

            <button id="btn-add-carrinho" class="botao-principal">Adicionar ao Carrinho</button>
        </div>
    </div>

    <!-- Carrinho / Checkout -->
    <div class="sheet-fundo oculto" id="sheet-fundo-carrinho">
        <div class="sheet" id="sheet-carrinho">
            <button class="fechar-sheet" id="fechar-sheet-carrinho">×</button>
            <h2>Seu Carrinho</h2>

            <div id="itens-carrinho"><p class="carregando">Carrinho vazio.</p></div>
            <p class="linha-total">Total <span class="etiqueta-preco" id="carrinho-total">R$ 0,00</span></p>

            <hr>

            <label for="nome">Seu Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label for="tipo-entrega">Como deseja receber?</label>
            <select id="tipo-entrega" onchange="controlarCamposEntrega(this.value)">
                <option value="local">Consumo no Local</option>
                <option value="retirada">Retirada</option>
                <option value="entrega">Entrega</option>
            </select>

            <div id="campos-entrega" class="oculto">
                <label for="telefone">Telefone / WhatsApp:</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000">
                <label for="endereco">Endereço Completo:</label>
                <textarea id="endereco" placeholder="Rua, Número, Bairro e Ponto de Referência"></textarea>
            </div>

            <label for="forma-pagamento">Forma de Pagamento</label>
            <select id="forma-pagamento" onchange="controlarTroco(this.value)">
                <option value="pix">Pix</option>
                <option value="cartao">Cartão</option>
                <option value="dinheiro">Dinheiro</option>
            </select>

            <div id="campo-troco" class="oculto">
                <label for="troco">Precisa de troco para quanto?</label>
                <input type="number" id="troco" step="0.01" placeholder="Ex: 50.00">
            </div>

            <p id="aviso-carrinho" class="erro oculto"></p>
            <button id="btn-confirmar-pedido" class="botao-principal">Confirmar Pedido</button>
        </div>
    </div>

    <!-- Barra flutuante do carrinho -->
    <button class="barra-carrinho oculto" id="barra-carrinho">
        <span id="carrinho-resumo">0 itens</span>
        <span>Ver Carrinho →</span>
    </button>

    <!-- Navegação inferior -->
    <nav class="nav-inferior">
        <button class="nav-item ativo" id="nav-inicio">🏠<span>Início</span></button>
        <button class="nav-item" id="nav-carrinho">🧺<span>Carrinho</span></button>
    </nav>

    <audio id="som-confirmacao" src="../sounds/sino.mp3" preload="auto"></audio>

    <script src="../js/api.js"></script>
    <script src="js/cliente.js"></script>
</body>
</html>
