<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha - Estação da Pizza</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="css/cozinha.css">
</head>
<body>
    <header class="logo-topo">
        <img src="../imagens/logo.png" alt="Estação da Pizza">
        <h1>👨‍🍳 Pedidos em Preparo</h1>
        <div class="acoes-cabecalho-cozinha">
            <button id="btn-tema-claro" type="button" title="Alternar modo claro"><span class="icone" data-icone="sol"></span> Modo Claro</button>
            <button id="btn-ativar-som" type="button">🔔 Ativar Som</button>
        </div>
    </header>
    <div id="lista-cozinha"><p>Carregando pedidos...</p></div>

    <audio id="som-sino" src="../sounds/sino.mp3" preload="auto"></audio>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/icones.js"></script>
    <script src="js/cozinha.js"></script>
</body>
</html>
